<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>🥲 Will u be my homeboy?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥲</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --accent: #f5c518;
      --accent2: #ff6b6b;
      --text: #f0ece4;
      --muted: #888;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: pan-y;
    }

    .page {
      display: none;
      min-height: 100vh;
      animation: fadeIn 0.5s ease;
    }
    .page.active { display: flex; flex-direction: column; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #page-ask {
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #page-ask::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,197,24,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .emoji-hero {
      font-size: clamp(4rem, 15vw, 7rem);
      line-height: 1;
      margin-bottom: 1.5rem;
      display: block;
      animation: bounce 2.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .ask-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .ask-title span {
      color: var(--accent);
    }

    .ask-sub {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 80px;
    }

    .btn-no-ghost {
      position: relative;
      width: auto;
      height: auto;
      flex-shrink: 0;
      display: inline-flex;
    }

    .btn-yes {
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 0.9rem 2.5rem;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
      z-index: 5;
    }

    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 0 32px rgba(245,197,24,0.35);
    }

    .btn-no {
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      padding: 0.9rem 2rem;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
      background-color: rgba(13,13,13,0.9);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: inline-block;
    }

    .btn-no.escaped-mode {
      position: fixed !important;
      z-index: 1000;
      transition: left 0.25s cubic-bezier(0.2, 1.2, 0.3, 1), top 0.25s cubic-bezier(0.2, 1.2, 0.3, 1);
      will-change: left, top;
      margin: 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .btn-no:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    #page-words {
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 2rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .words-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .words-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2rem;
    }

    .words-body {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(240,236,228,0.85);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .words-img-wrap {
      width: 100%;
      margin-top: 2.5rem;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .words-img-wrap img {
      width: 100%;
      display: block;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 2.5rem;
      padding: 0;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--text); }

    #page-yes {
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 2rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .yes-emoji {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes pop {
      0% { transform: scale(0.3); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .yes-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .yes-sub {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .upload-zone {
      width: 100%;
      border: 2px dashed rgba(245,197,24,0.3);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
      position: relative;
      display: none;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }
    .upload-text { color: var(--muted); font-size: 0.95rem; }
    .upload-text strong { color: var(--accent); }

    #yes-preview {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    #yes-preview img { width: 100%; display: block; }

    .words-input-label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
      font-weight: 500;
      display: block;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 1rem 1.2rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .save-btn {
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.15s;
      display: none;
    }

    .save-btn:hover { transform: scale(1.04); }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      z-index: 100;
      background: rgba(13,13,13,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 1.4rem;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-link {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover, .nav-link.active-nav {
      color: var(--text);
      border-color: rgba(255,255,255,0.3);
    }

    .page-inner {
      padding-top: 70px;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 480px) {
      nav { padding: 0.75rem 1rem; }
      .nav-link { font-size: 0.72rem; padding: 0.35rem 0.65rem; }
      .page-inner { padding-top: 60px; }
      #page-ask { padding: 1.5rem 1rem; }
      .ask-title { font-size: clamp(1.8rem, 10vw, 2.5rem); }
      .btn-row { gap: 0.75rem; }
      .btn-yes { font-size: 1.1rem; padding: 0.8rem 1.8rem;}
      textarea { font-size: 16px; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<nav>
  <span class="nav-logo">🥲</span>
  <div class="nav-links">
    <button class="nav-link active-nav" onclick="showPage('ask')">ask</button>
    <button class="nav-link" onclick="showPage('words')">words</button>
  </div>
</nav>

<!-- PAGE 1: ASK -->

  <span class="emoji-hero">🥲</span>
  <h1 class="ask-title">will u be my<br/><span>homeboy?</span></h1>
  <p class="ask-sub">be real with me rn</p>
  <div class="btn-row">

    <div class="btn-no-ghost" id="btn-no-ghost">
      <button class="btn-no" id="btn-no">nah</button>
    </div>
  </div>
</div>

<script>
  // ===== PAGE NAVIGATION =====
  function showPage(id) {
    resetNoButtonPosition();
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.textContent.trim().startsWith(id === 'ask' ? 'ask' : 'words')) {
        l.classList.add('active-nav');
      }
    });
    window.scrollTo(0, 0);
  }

  // Reset NO button position
  function resetNoButtonPosition() {
    const noBtn = document.getElementById('btn-no');
    if (!noBtn) return;
    noBtn.classList.remove('escaped-mode');
    noBtn.style.position = '';
    noBtn.style.left = '';
    noBtn.style.top = '';
    noBtn.style.zIndex = '';
    noBtn.style.margin = '';
    noBtn.style.transition = '';
    const ghost = document.getElementById('btn-no-ghost');
    if (ghost && noBtn.parentNode !== ghost) {
      ghost.appendChild(noBtn);
    }
  }

  // Make NO button escape on click/tap
  function makeNoButtonEscape(event) {
    const btn = document.getElementById('btn-no');
    if (!btn) return;
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    if (!btn.classList.contains('escaped-mode')) {
      const rect = btn.getBoundingClientRect();
      btn.classList.add('escaped-mode');
      btn.style.position = 'fixed';
      btn.style.left = rect.left + 'px';
      btn.style.top = rect.top + 'px';
      btn.style.margin = '0';
      btn.style.zIndex = '2000';
    }
    const btnW = btn.offsetWidth;
    const btnH = btn.offsetHeight;
    const margin = 18;
    const viewW = window.innerWidth;
    const viewH = window.innerHeight;
    let maxX = viewW - btnW - margin;
    let maxY = viewH - btnH - margin;
    if (maxX < margin) maxX = margin;
    if (maxY < margin) maxY = margin;
    let x = margin + Math.random() * Math.max(0, maxX - margin);
    let y = margin + Math.random() * Math.max(0, maxY - margin);
    btn.style.transition = 'left 0.28s cubic-bezier(0.34, 1.2, 0.64, 1), top 0.28s cubic-bezier(0.34, 1.2, 0.64, 1)';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
    if (navigator.vibrate) navigator.vibrate(20);
  }

  // Attach escape event to NO button
  function attachNoButtonEscapeEvent() {
    const noBtn = document.getElementById('btn-no');
    if (!noBtn) return;
    const escapeHandler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      makeNoButtonEscape(e);
    };
    noBtn.removeEventListener('click', escapeHandler);
    noBtn.removeEventListener('touchstart', escapeHandler);
    noBtn.addEventListener('click', escapeHandler);
    noBtn.addEventListener('touchstart', escapeHandler, { passive: false });
  }

  // Reset button on resize
  function resetButtonOnResize() {
    const btn = document.getElementById('btn-no');
    if (btn && btn.classList.contains('escaped-mode')) {
      const btnW = btn.offsetWidth;
      const btnH = btn.offsetHeight;
      const margin = 18;
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      let maxX = viewW - btnW - margin;
      let maxY = viewH - btnH - margin;
      if (maxX < margin) maxX = margin;
      if (maxY < margin) maxY = margin;
      let x = Math.min(Math.max(parseFloat(btn.style.left) || margin, margin), maxX);
      let y = Math.min(Math.max(parseFloat(btn.style.top) || margin, margin), maxY);
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }
  }

  // ===== YES BUTTON =====
  function handleYes() {
    launchConfetti();
    resetNoButtonPosition();
    showPage('words');
  }

  // ===== CONFETTI =====
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let pieces = [];
  let rafId;

  function launchConfetti() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    pieces = Array.from({length: 150}, () => ({
      x: Math.random() * canvas.width,
      y: -20,
      r: Math.random() * 8 + 4,
      d: Math.random() * 80 + 20,
      color: ['#f5c518','#ff6b6b','#fff','#aef7c8','#a78bfa'][Math.floor(Math.random()*5)],
      tilt: Math.random() * 10 - 10,
      tiltSpeed: Math.random() * 0.1 + 0.05,
      speed: Math.random() * 3 + 2
    }));
    if (rafId) cancelAnimationFrame(rafId);
    animateConfetti();
    setTimeout(() => { 
      if (rafId) cancelAnimationFrame(rafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }, 3200);
  }
  
  function animateConfetti() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let anyAlive = false;
    pieces.forEach(p => {
      p.y += p.speed;
      p.tilt += p.tiltSpeed;
      if (p.y < canvas.height + 50) anyAlive = true;
      ctx.beginPath();
      ctx.arc(p.x + Math.sin(p.tilt) * 10, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    if (anyAlive) {
      rafId = requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // Handle page navigation reset
  const originalShowPage = showPage;
  window.showPage = function(id) {
    if (id === 'ask') {
      resetNoButtonPosition();
    }
    originalShowPage(id);
  };
  
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      const text = link.textContent.trim();
      if (text === 'ask') resetNoButtonPosition();
      else if (text === 'words') resetNoButtonPosition();
    });
  });
  
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resetButtonOnResize();
  });
  
  window.addEventListener('orientationchange', () => {
    setTimeout(resetButtonOnResize, 30);
  });
  
  window.addEventListener('load', () => {
    resetNoButtonPosition();
    attachNoButtonEscapeEvent();
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // Make functions global
  window.handleYes = handleYes;
  window.showPage = showPage;
</script>
</body>
</html>
