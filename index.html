<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>🥲 Will u be my homeboy? — mobile escape button</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥲</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --accent: #f5c518;
      --accent2: #ff6b6b;
      --text: #f0ece4;
      --muted: #888;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: pan-y; /* prevent horizontal panning interference, but keep vertical scroll */
    }

    /* ===== PAGES ===== */
    .page {
      display: none;
      min-height: 100vh;
      animation: fadeIn 0.5s ease;
    }
    .page.active { display: flex; flex-direction: column; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== PAGE 1 — ASK ===== */
    #page-ask {
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #page-ask::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,197,24,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .emoji-hero {
      font-size: clamp(4rem, 15vw, 7rem);
      line-height: 1;
      margin-bottom: 1.5rem;
      display: block;
      animation: bounce 2.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .ask-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .ask-title span {
      color: var(--accent);
    }

    .ask-sub {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      position: relative;
      min-height: 80px;
    }

    /* No button wrapper — keeps layout stable, but button inside becomes absolutely positioned only when escaping */
    .btn-no-ghost {
      position: relative;
      width: auto;
      height: auto;
      flex-shrink: 0;
      display: inline-flex;
    }

    .btn-yes {
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 0.9rem 2.5rem;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
      z-index: 5;
    }

    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 0 32px rgba(245,197,24,0.35);
    }

    .btn-no {
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      padding: 0.9rem 2rem;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
      background-color: rgba(13,13,13,0.9);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: inline-block;
    }

    /* When button is in "escaped" mode (absolute positioning) */
    .btn-no.escaped-mode {
      position: fixed !important;
      z-index: 1000;
      transition: left 0.25s cubic-bezier(0.2, 1.2, 0.3, 1), top 0.25s cubic-bezier(0.2, 1.2, 0.3, 1);
      will-change: left, top;
      margin: 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .btn-no:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ===== PAGE 2 — WORDS ===== */
    #page-words {
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 2rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .words-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .words-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2rem;
    }

    .words-body {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(240,236,228,0.85);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .words-img-wrap {
      width: 100%;
      margin-top: 2.5rem;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .words-img-wrap img {
      width: 100%;
      display: block;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 2.5rem;
      padding: 0;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--text); }

    /* ===== PAGE 3 — YES ===== */
    #page-yes {
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 2rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .yes-emoji {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes pop {
      0% { transform: scale(0.3); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .yes-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .yes-sub {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .upload-zone {
      width: 100%;
      border: 2px dashed rgba(245,197,24,0.3);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: rgba(245,197,24,0.04);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }
    .upload-text { color: var(--muted); font-size: 0.95rem; }
    .upload-text strong { color: var(--accent); }

    #yes-preview {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      display: none;
    }

    #yes-preview img { width: 100%; display: block; }

    .words-input-label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
      font-weight: 500;
      display: block;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 1rem 1.2rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .save-btn {
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .save-btn:hover { transform: scale(1.04); }

    /* ===== NAV ===== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      z-index: 100;
      background: rgba(13,13,13,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 1.4rem;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-link {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover, .nav-link.active-nav {
      color: var(--text);
      border-color: rgba(255,255,255,0.3);
    }

    /* push content below nav */
    .page-inner {
      padding-top: 70px;
    }

    /* confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      nav { padding: 0.75rem 1rem; }
      .nav-link { font-size: 0.72rem; padding: 0.35rem 0.65rem; }
      .page-inner { padding-top: 60px; }

      #page-ask { padding: 1.5rem 1rem; }
      .ask-title { font-size: clamp(1.8rem, 10vw, 2.5rem); }

      .btn-row { gap: 0.75rem; }
      .btn-yes { font-size: 1.1rem; padding: 0.8rem 1.8rem;}

      .upload-zone { padding: 1.5rem 1rem; }

      textarea { font-size: 16px; }

      #page-words > div,
      #page-yes  > div { padding: 2rem 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<nav>
  <span class="nav-logo">🥲</span>
  <div class="nav-links">
    <button class="nav-link active-nav" onclick="showPage('ask')">ask</button>
    <button class="nav-link" onclick="showPage('words')">words</button>
    <button class="nav-link" onclick="showPage('yes')">yes page</button>
  </div>
</nav>

<!-- PAGE 1: ASK -->
<div id="page-ask" class="page active page-inner">
  <span class="emoji-hero">🥲</span>
  <h1 class="ask-title">will u be my<br/><span>homeboy?</span></h1>
  <p class="ask-sub">be real with me rn</p>
  <div class="btn-row">
    <button class="btn-yes" onclick="handleYes()">yes omg 🤝</button>
    <div class="btn-no-ghost" id="btn-no-ghost">
      <button class="btn-no" id="btn-no">nah</button>
    </div>
  </div>
</div>

<!-- PAGE 2: WORDS + PIC -->
<div id="page-words" class="page page-inner" style="width:100%;">
  <div style="max-width:720px; margin:0 auto; padding:4rem 2rem; width:100%;">
    <button class="back-btn" onclick="showPage('ask')">← back</button>
    <div class="words-label" id="words-label-display">a note for u 💛</div>
    <h2 class="words-title" id="words-title-display">this is the words page</h2>
    <p class="words-body" id="words-body-display">add your words from the yes page and they'll show up here. this is where the feelings go 🤝</p>
    <div class="words-img-wrap" id="words-img-container" style="display:none;">
      <img id="words-img-display" src="" alt="your pic"/>
    </div>
  </div>
</div>

<!-- PAGE 3: YES (EDITOR) -->
<div id="page-yes" class="page page-inner" style="width:100%;">
  <div style="max-width:720px; margin:0 auto; padding:4rem 2rem; width:100%;">
    <div class="yes-emoji">🤝</div>
    <h2 class="yes-title">they said yes!!</h2>
    <p class="yes-sub">add a pic and some words for the words page</p>

    <div class="upload-zone" id="upload-zone">
      <input type="file" accept="image/*" id="img-input" onchange="handleImgUpload(event)"/>
      <span class="upload-icon">🖼️</span>
      <p class="upload-text"><strong>click to add a pic</strong><br/>jpg, png, gif — anything goes</p>
    </div>

    <div id="yes-preview">
      <img id="yes-preview-img" src="" alt="preview"/>
    </div>

    <label class="words-input-label">your words</label>
    <textarea id="words-textarea" placeholder="type something real here... what does it mean to u to have a homeboy? go off 💛"></textarea>

    <label class="words-input-label">title</label>
    <input type="text" id="words-title-input" placeholder="give it a title..." style="width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem; padding:0.9rem 1.2rem; outline:none; margin-bottom:1.5rem; transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>

    <button class="save-btn" onclick="saveWords()">save to words page ✨</button>
  </div>
</div>

<script>
  // Global references
  let activeEscapeActive = false; // keep track if button is currently escaped (floating)
  let escapeTimeout = null;

  // ===== PAGE NAVIGATION =====
  function showPage(id) {
    // Whenever we change page, reset the "nah" button to its original state & position
    resetNoButtonPosition();

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.textContent.trim().startsWith(id === 'ask' ? 'ask' : id === 'words' ? 'words' : 'yes')) {
        l.classList.add('active-nav');
      }
    });
    window.scrollTo(0, 0);
  }

  // Reset the NO button: remove fixed positioning, restore inside ghost container
  function resetNoButtonPosition() {
    const noBtn = document.getElementById('btn-no');
    if (!noBtn) return;
    // Cancel any pending escape timeout if needed
    if (escapeTimeout) clearTimeout(escapeTimeout);
    
    // remove escaped-mode class and fixed styles
    noBtn.classList.remove('escaped-mode');
    noBtn.style.position = '';
    noBtn.style.left = '';
    noBtn.style.top = '';
    noBtn.style.zIndex = '';
    noBtn.style.margin = '';
    noBtn.style.transition = '';

    // Ensure it's back inside its parent (ghost) naturally
    const ghost = document.getElementById('btn-no-ghost');
    if (ghost && noBtn.parentNode !== ghost) {
      ghost.appendChild(noBtn);
    }
    activeEscapeActive = false;
  }

  // Improved escape logic for both mouse and touch (mobile)
  function makeNoButtonEscape(event) {
    const btn = document.getElementById('btn-no');
    if (!btn) return;

    // Prevent default to avoid accidental double-trigger or weird tap highlighting
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }

    // If button already escaped and is moving, we can still reposition further
    // but first we remove any ongoing transitions cleanly by resetting immediate style? we'll just reposition.
    
    // Ensure button is in 'escaped-mode' (fixed relative to viewport)
    if (!btn.classList.contains('escaped-mode')) {
      // Get current position relative to viewport before switching to fixed
      const rect = btn.getBoundingClientRect();
      // Add class and set initial fixed coordinates to current position to avoid jump
      btn.classList.add('escaped-mode');
      btn.style.position = 'fixed';
      btn.style.left = rect.left + 'px';
      btn.style.top = rect.top + 'px';
      btn.style.margin = '0';
      btn.style.zIndex = '2000';
      activeEscapeActive = true;
    }

    // Get dimensions and safe margins
    const btnW = btn.offsetWidth;
    const btnH = btn.offsetHeight;
    const margin = 18;
    // viewport dimensions
    const viewW = window.innerWidth;
    const viewH = window.innerHeight;
    
    // Compute random but entirely visible position (ensure button doesn't go off screen)
    let maxX = viewW - btnW - margin;
    let maxY = viewH - btnH - margin;
    if (maxX < margin) maxX = margin;
    if (maxY < margin) maxY = margin;
    
    let x = margin + Math.random() * Math.max(0, maxX - margin);
    let y = margin + Math.random() * Math.max(0, maxY - margin);
    
    // Slight snap to avoid hiding behind nav? nav is about 60-70px, but we allow it,
    // but we can optionally also bias y to avoid nav. But it's fine, it’s fun.
    // Additionally, we can ensure y > 70 if we want, but random is fine.
    
    // Apply smooth transition
    btn.style.transition = 'left 0.28s cubic-bezier(0.34, 1.2, 0.64, 1), top 0.28s cubic-bezier(0.34, 1.2, 0.64, 1)';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
    
    // Haptics (optional but fun: not all browsers support but no error)
    if (navigator.vibrate) navigator.vibrate(20);
    
    // Auto reset after 1.5 seconds? No, we want button to stay escaped but we also want user to tap again to continue escaping.
    // But when page changes (navigation) we reset. It's more fun: the "nah" button remains in playful position until page switch or they tap "yes" or navigation.
    // However, if they keep tapping "nah" it'll keep jumping around.
    // Also after each escape, we set a timeout to maybe reset the transition? Not needed.
  }

  // Handler for both desktop (mouse) and mobile (touchstart + click)
  function attachNoButtonEscapeEvent() {
    const noBtn = document.getElementById('btn-no');
    if (!noBtn) return;

    // Clean previous listeners to avoid duplication (simple approach: new listeners, but we can manage)
    // We'll replace with new ones. But easier: remove existing and reattach.
    // However we use named handlers? We'll define a fresh escape function.
    const escapeHandler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      makeNoButtonEscape(e);
    };
    
    // Remove old listeners (just in case)
    noBtn.removeEventListener('click', escapeHandler);
    noBtn.removeEventListener('touchstart', escapeHandler);
    // add both click (for desktop) and touchstart (for mobile, reacts instantly)
    noBtn.addEventListener('click', escapeHandler);
    noBtn.addEventListener('touchstart', escapeHandler, { passive: false });
  }

  // Reset button position on window resize, so it doesn't get stuck offscreen if orientation changes
  function resetButtonOnResize() {
    const btn = document.getElementById('btn-no');
    if (btn && btn.classList.contains('escaped-mode')) {
      // If we are in escaped mode, re-evaluate safe position
      const btnW = btn.offsetWidth;
      const btnH = btn.offsetHeight;
      const margin = 18;
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      let maxX = viewW - btnW - margin;
      let maxY = viewH - btnH - margin;
      if (maxX < margin) maxX = margin;
      if (maxY < margin) maxY = margin;
      let x = Math.min(Math.max(parseFloat(btn.style.left) || margin, margin), maxX);
      let y = Math.min(Math.max(parseFloat(btn.style.top) || margin, margin), maxY);
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }
  }

  // ===== YES BUTTON =====
  function handleYes() {
    launchConfetti();
    // reset no button before switching to yes page so it's normal in ask page if back
    resetNoButtonPosition();
    setTimeout(() => showPage('yes'), 500);
  }

  // ===== IMAGE UPLOAD =====
  function handleImgUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      window._uploadedImgSrc = ev.target.result;
      document.getElementById('yes-preview-img').src = ev.target.result;
      document.getElementById('yes-preview').style.display = 'block';
      document.getElementById('upload-zone').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ===== SAVE WORDS =====
  function saveWords() {
    const body = document.getElementById('words-textarea').value.trim();
    const title = document.getElementById('words-title-input').value.trim();

    if (title) document.getElementById('words-title-display').textContent = title;
    if (body)  document.getElementById('words-body-display').textContent = body;

    if (window._uploadedImgSrc) {
      document.getElementById('words-img-display').src = window._uploadedImgSrc;
      document.getElementById('words-img-container').style.display = 'block';
    }

    showPage('words');
  }

  // ===== CONFETTI (working) =====
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let pieces = [];
  let rafId;

  function launchConfetti() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    pieces = Array.from({length: 150}, () => ({
      x: Math.random() * canvas.width,
      y: -20,
      r: Math.random() * 8 + 4,
      d: Math.random() * 80 + 20,
      color: ['#f5c518','#ff6b6b','#fff','#aef7c8','#a78bfa'][Math.floor(Math.random()*5)],
      tilt: Math.random() * 10 - 10,
      tiltSpeed: Math.random() * 0.1 + 0.05,
      speed: Math.random() * 3 + 2
    }));
    if (rafId) cancelAnimationFrame(rafId);
    animateConfetti();
    setTimeout(() => { 
      if (rafId) cancelAnimationFrame(rafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }, 3200);
  }
  
  function animateConfetti() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let anyAlive = false;
    pieces.forEach(p => {
      p.y += p.speed;
      p.tilt += p.tiltSpeed;
      if (p.y < canvas.height + 50) anyAlive = true;
      ctx.beginPath();
      ctx.arc(p.x + Math.sin(p.tilt) * 10, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    if (anyAlive) {
      rafId = requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resetButtonOnResize();
  });
  
  // Initial call for button escape logic
  function initEscape() {
    attachNoButtonEscapeEvent();
    // Also make sure if any accidental click on container ghost is safe
    const ghost = document.getElementById('btn-no-ghost');
    if (ghost) {
      ghost.addEventListener('click', (e) => {
        // avoid double triggering, but we only want btn itself
        e.stopPropagation();
      });
    }
  }

  // Reset no button when page "ask" becomes active? Optionally we reset on showPage ask? We'll do within showPage when ask is called
  // Override showPage to reset on ask
  const originalShowPage = showPage;
  window.showPage = function(id) {
    if (id === 'ask') {
      resetNoButtonPosition();
    }
    originalShowPage(id);
  };
  
  // Also trigger when leaving yes/words, but fine.
  // Ensure reset if user clicks ask nav manually.
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      const text = link.textContent.trim();
      if (text === 'ask') {
        resetNoButtonPosition();
      } else if (text === 'words') {
        resetNoButtonPosition();
      } else if (text === 'yes page') {
        resetNoButtonPosition();
      }
    });
  });
  
  // Export functions globally 
  window.handleYes = handleYes;
  window.handleImgUpload = handleImgUpload;
  window.saveWords = saveWords;
  
  // Full init
  initEscape();
  // Also if any orientation or resize, reset escaped position.
  window.addEventListener('orientationchange', () => {
    setTimeout(resetButtonOnResize, 30);
  });
  
  // Additional: On load, ensure button is not escaped
  window.addEventListener('load', () => {
    resetNoButtonPosition();
    attachNoButtonEscapeEvent();
    // Ensure canvas resize
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
  
  // Fix possible ghost glitches on iOS: force touch callout removal
  const noBtnElement = document.getElementById('btn-no');
  if (noBtnElement) {
    noBtnElement.addEventListener('touchstart', (e) => {
      // we already do in escape handler, just ensure no context menu
      e.preventDefault();
    }, { passive: false });
  }

  // Additional: for mobile, no double fire because touchstart and click both may fire, but we prevent default & stopPropagation
  // The escape handler includes both, but it's fine: extra call may cause double jump, but we added an early check? 
  // Actually we'll dedupe by making makeNoButtonEscape idempotent but movement is fine. Slight double trigger can cause double reposition but looks bouncy.
  // improve: use requestAnimationFrame to batch? but it's cute anyway, not critical.
  console.log('🔥 mobile-friendly no button escape ready — tap "nah" and it runs!');
</script>
